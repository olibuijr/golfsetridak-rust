{% include "header" %}
    <section class="page-hero">
      <div class="page-hero-inner">
        <p class="eyebrow">Bóka tíma</p>
        <h1>Staðfestu <span class="accent">bókun</span></h1>
        <p class="lede">{{ slot_date }} kl. {{ slot_time }} — {{ price_label }}</p>
      </div>
    </section>

    <section class="section">
      <div class="cta-card" style="max-width:34rem">
        <p class="section-tag">Rástími</p>
        <h2>{{ slot_date }} · {{ slot_time }}</h2>
        <p>Verð: <strong style="color:var(--accent)">{{ price_label }}</strong></p>
        <div class="btn-row">
          <button class="btn btn-primary" type="button" id="book-btn">Setja í körfu</button>
          <a class="btn btn-ghost" href="/">Til baka í dagatal</a>
        </div>
        <p id="book-status" class="muted" role="status" style="margin-top:14px"></p>
      </div>
    </section>

    <script>
      document.getElementById("book-btn").addEventListener("click", addSlotToCart);

      async function addSlotToCart() {
        var btn = document.getElementById("book-btn");
        var status = document.getElementById("book-status");
        if (btn.disabled) return;
        btn.disabled = true;
        status.textContent = "Set tíma í körfu...";
        try {
          await postCartItem({ type: "slot", refId: "{{ slot_iso }}", quantity: 1 });
          status.textContent = "Tíminn er kominn í körfu.";
          btn.textContent = "Komið í körfu";
          window.setTimeout(function () {
            btn.textContent = "Setja í körfu";
            btn.disabled = false;
          }, 1400);
        } catch (err) {
          status.textContent = err.message || "Tókst ekki að setja tíma í körfu.";
          btn.disabled = false;
        }
      }

      async function postCartItem(payload) {
        if (window.GolfCart && typeof window.GolfCart.addItem === "function") {
          return window.GolfCart.addItem(payload);
        }
        var res = await fetch("/api/cart/items", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify(payload)
        });
        var data = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          throw new Error(data.error || "Tókst ekki að setja tíma í körfu.");
        }
        return data.cart;
      }
    </script>
{% include "footer" %}
