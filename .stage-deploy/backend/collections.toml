# Golfsetrið Akureyri — declarative data model (Phase 1 subset).
#
# This file ports the *catalog* and *config* entities of the golfsetridak Drizzle
# schema onto the AkurAI-Framework auto-API collection model. Declaring a
# collection mounts a full REST API at /api/collections/<name>/records (list,
# create, read, update, delete + ?search) with validation derived from these
# field types — no handwritten endpoint code.
#
# Field types: text | int | float | bool | relation | file
#   required = true            → must be present on create
#   embed = true               → (text only) auto-embedded for semantic ?search
#   relation → collection = "" → names the target collection (stores its id)
#
# IMPORTANT — what the collection model intentionally does NOT express, and is
# therefore enforced in Phase 3 SQL (see PORT.md):
#   • DEFAULT values, NOT NULL on non-required fields, UNIQUE constraints
#   • enum/check constraints (status/role/type fields are plain `text` here)
#   • composite-unique indexes and partial indexes
#   • money is integer ISK (minor units are not used by the source)
#   • timestamps are integer epoch-milliseconds, app-set (created_at/updated_at)
#   • records use an auto-increment integer id; the source uses text UUIDs and
#     UUID foreign keys — relation wiring is revisited when the SQL layer lands.
#
# Entities that need atomic constraints/transactions (bookings unique-slot,
# carts, cart_items, payments, gift_card_redemptions balance decrements,
# user_packages remaining, the user_subscription_* tables, auth tables) are NOT
# forced into collections — they are documented in PORT.md as "SQL +
# transaction-backed, Phase 3" with their intended DDL.

# ---- Shop: product categories -------------------------------------------
[[collection]]
name = "product_categories"

  [[collection.field]]
  name = "name"
  type = "text"
  required = true

  [[collection.field]]
  name = "slug"          # UNIQUE in source (enforced in Phase 3 SQL)
  type = "text"
  required = true

  [[collection.field]]
  name = "description"
  type = "text"

  [[collection.field]]
  name = "position"      # default 0
  type = "int"

  [[collection.field]]
  name = "active"        # default true
  type = "bool"

  [[collection.field]]
  name = "created_at"
  type = "int"

  [[collection.field]]
  name = "updated_at"
  type = "int"

# ---- Shop: products ------------------------------------------------------
[[collection]]
name = "products"

  [[collection.field]]
  name = "name"
  type = "text"
  required = true

  [[collection.field]]
  name = "description"
  type = "text"
  embed = true           # searchable product copy

  [[collection.field]]
  name = "price"         # ISK, integer
  type = "int"
  required = true

  [[collection.field]]
  name = "image_url"
  type = "text"

  [[collection.field]]
  name = "category"      # FK → product_categories (SET NULL in source)
  type = "relation"
  collection = "product_categories"

  [[collection.field]]
  name = "active"        # default true
  type = "bool"

  [[collection.field]]
  name = "position"      # default 0
  type = "int"

  [[collection.field]]
  name = "created_at"
  type = "int"

  [[collection.field]]
  name = "updated_at"
  type = "int"

# ---- Booking slot packages (klippikort) ---------------------------------
[[collection]]
name = "packages"

  [[collection.field]]
