  [[collection.field]]
  name = "slot_count"
  type = "int"
  required = true

  [[collection.field]]
  name = "price"         # ISK, integer
  type = "int"
  required = true

  [[collection.field]]
  name = "active"        # default true
  type = "bool"

# ---- Subscription tiers --------------------------------------------------
[[collection]]
name = "subscriptions"

  [[collection.field]]
  name = "name"
  type = "text"
  required = true

  [[collection.field]]
  name = "valid_from"    # date string
  type = "text"
  required = true

  [[collection.field]]
  name = "valid_until"   # date string
  type = "text"
  required = true

  [[collection.field]]
  name = "daily_limit"   # default 2
  type = "int"

  [[collection.field]]
  name = "price"         # ISK, integer
  type = "int"
  required = true

  [[collection.field]]
  name = "shareable"     # default false
  type = "bool"

  [[collection.field]]
  name = "max_members"   # default 1
  type = "int"

  [[collection.field]]
  name = "active"        # default true
  type = "bool"

# ---- Hourly pricing rules ------------------------------------------------
[[collection]]
name = "pricing_rules"

  [[collection.field]]
  name = "name"
