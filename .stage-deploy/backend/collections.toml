# ---- Gift cards (issuance catalog) --------------------------------------
# NOTE: `balance` decrements on redemption — that mutation is transaction-backed
# in Phase 3 (gift_card_redemptions). The card record itself is catalog-like.
[[collection]]
name = "gift_cards"

  [[collection.field]]
  name = "code"          # UNIQUE in source
  type = "text"
  required = true

  [[collection.field]]
  name = "amount"        # ISK initial value
  type = "int"
  required = true

  [[collection.field]]
  name = "balance"       # ISK remaining (Phase 3 decrements atomically)
  type = "int"
  required = true

  [[collection.field]]
  name = "currency"      # default ISK
  type = "text"

  [[collection.field]]
  name = "status"        # enum: active|used|expired|cancelled
  type = "text"

  [[collection.field]]
  name = "expires_at"
  type = "int"

  [[collection.field]]
  name = "delivery_at"
  type = "int"

  [[collection.field]]
  name = "delivered_at"
  type = "int"

  [[collection.field]]
  name = "recipient_email"
  type = "text"

  [[collection.field]]
  name = "recipient_phone"
  type = "text"

  [[collection.field]]
  name = "recipient_name"
  type = "text"

  [[collection.field]]
  name = "message"
  type = "text"

  [[collection.field]]
  name = "created_at"
  type = "int"

  [[collection.field]]
  name = "updated_at"
  type = "int"

# ---- SMS templates -------------------------------------------------------
# Source PK is the text `key`; collections use an auto id, so `key` is a UNIQUE
# text field here (Phase 3 SQL enforces uniqueness).
[[collection]]
name = "sms_templates"

  [[collection.field]]
  name = "key"
  type = "text"
  required = true

  [[collection.field]]
  name = "body"
  type = "text"
  required = true

  [[collection.field]]
  name = "updated_at"
  type = "int"

# ---- Email templates -----------------------------------------------------
[[collection]]
name = "email_templates"

  [[collection.field]]
