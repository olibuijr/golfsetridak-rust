# ---- Cart session + line items (runtime uses src/cart B+trees) ------------
[[collection]]
name = "carts"

  [[collection.field]]
  name = "user_id"
  type = "text"

  [[collection.field]]
  name = "status"        # open | checking_out | paid | abandoned | failed
  type = "text"
  required = true

  [[collection.field]]
  name = "currency"      # ISK
  type = "text"
  required = true

  [[collection.field]]
  name = "created_at"
  type = "int"

  [[collection.field]]
  name = "updated_at"
  type = "int"

[[collection]]
name = "cart_items"

  [[collection.field]]
  name = "cart_id"
  type = "relation"
  collection = "carts"
  required = true

  [[collection.field]]
  name = "type"          # product | package | slot | subscription | gift_card
  type = "text"
  required = true

  [[collection.field]]
  name = "ref_id"
  type = "text"
  required = true

  [[collection.field]]
  name = "name_snapshot"
  type = "text"
  required = true

  [[collection.field]]
  name = "unit_price"    # ISK, integer
  type = "int"
  required = true

  [[collection.field]]
  name = "quantity"
  type = "int"
  required = true

  [[collection.field]]
  name = "metadata"      # JSON string when represented in collections
  type = "text"

  [[collection.field]]
  name = "created_at"
  type = "int"

# ---- Business users (the app `users` table) ------------------------------
# The customer/staff records the booking + admin flows key off. Source PK is a
# text UUID; collections use an auto integer id, so the migration keys records
# by email/phone (both UNIQUE in source — enforced in Phase 3 SQL). `role` is a
# plain text enum here ('customer' | 'admin'); `fixed_price` overrides slot
# pricing per user; `payday_customer_id`/`kennitala` feed invoicing.
[[collection]]
name = "users"

  [[collection.field]]
  name = "name"
  type = "text"
  required = true

  [[collection.field]]
  name = "email"         # UNIQUE in source
  type = "text"

  [[collection.field]]
  name = "phone"         # UNIQUE in source
  type = "text"

  [[collection.field]]
  name = "role"          # 'customer' (default) | 'admin'
  type = "text"

  [[collection.field]]
  name = "fixed_price"   # ISK per-slot override, integer
  type = "int"

  [[collection.field]]
  name = "kennitala"
  type = "text"

  [[collection.field]]
  name = "payday_customer_id"
  type = "text"

  [[collection.field]]
  name = "created_at"
  type = "int"

  [[collection.field]]
  name = "updated_at"
  type = "int"
