{% include "header" %}
    <section class="page-hero">
      <div class="page-hero-inner">
        <p class="eyebrow">Notendahandbók</p>
        <h1>Notenda<span class="accent">handbók</span></h1>
        <p class="lede">Leiðbeiningar um bókanir, greiðslur, klippikort og aðgang að Golfsetrinu.</p>
      </div>
    </section>

    <section class="content-section">
      <div class="handbook-grid">
        {% for ch in chapters %}
        {% if ch.exists %}
        <a class="handbook-card is-link" href="/notendahandbok/{{ ch.slug }}">
          <span class="icon-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5a2 2 0 0 1 2-2h12a1 1 0 0 1 1 1v15a1 1 0 0 1-1 1H6a2 2 0 0 1-2-2 2 2 0 0 1 2-2h13"/></svg></span>
          <span>{{ ch.title }}</span>
        </a>
        {% else %}
        <div class="handbook-card is-muted">
          <span class="icon-box" style="background:rgba(255,255,255,0.05);color:var(--muted)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5a2 2 0 0 1 2-2h12a1 1 0 0 1 1 1v15a1 1 0 0 1-1 1H6a2 2 0 0 1-2-2 2 2 0 0 1 2-2h13"/></svg></span>
          <span>{{ ch.title }}</span>
        </div>
        {% endif %}
        {% endfor %}
      </div>
    </section>
{% include "footer" %}
