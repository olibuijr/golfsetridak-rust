<!doctype html>
<html lang="is">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{{ page_title }}</title>
    {% if meta_description %}<meta name="description" content="{{ meta_description }}" />{% endif %}
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@300;400;500;600&display=swap" />
    <link rel="stylesheet" href="/styles.css" />
    <!-- Atomic utility classes generated from the markup by the framework's CSS
         engine (empty if no utility class is used). See /utilities.css. -->
    <link rel="stylesheet" href="/utilities.css" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://golfsetridak.is/assets/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <header class="nav">
      <button class="nav-toggle" type="button" aria-label="Opna valmynd" aria-controls="site-drawer" aria-expanded="false">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <a class="brand" href="/">
        <img class="brand-mark" src="/assets/mark.svg" width="34" height="34" alt="" aria-hidden="true" />
        <span class="brand-text">
          <span class="brand-name">{{ brand }}</span>
          <span class="brand-place">{{ brand_place }}</span>
        </span>
      </a>
      <nav class="nav-links" id="site-drawer">
        <div class="nav-drawer-head">
          <span class="nav-drawer-title">Valmynd</span>
          <button class="nav-drawer-close" type="button" aria-label="Loka valmynd">&times;</button>
        </div>
        {% for link in nav %}<a href="{{ link.href }}">{{ link.label }}</a>{% endfor %}
      </nav>
      {% if auth_user_email %}
      <div class="nav-auth">
        <span class="nav-user">{{ auth_user_email }}</span>
        <form method="post" action="/logout" style="display:inline">
          <button class="btn btn-ghost nav-logout" type="submit">Útskrá</button>
        </form>
      </div>
      {% else %}
      <a class="btn btn-primary nav-login" href="/login">Innskrá</a>
      {% endif %}
    </header>
    <div class="nav-overlay" hidden></div>
    <main class="container">
