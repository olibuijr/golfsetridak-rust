{% include "header" %}
    <div class="admin-layout">
      {% include "admin_nav" %}
      <div class="admin-main">
        <section class="admin-head">
          <div>
            <h1>SMS sniðmát</h1>
            <p class="lede">Skilaboð sem send eru sjálfvirkt við bókanir, kaup og gjafabréf.</p>
          </div>
        </section>

    {% if saved %}<p class="admin-banner admin-banner-ok">Sniðmát vistað.</p>{% endif %}
    {% if error %}<p class="admin-banner admin-banner-error">{{ error }}</p>{% endif %}

    {% for t in templates %}
    <section class="admin-card">
      <h2>{{ t.label }}</h2>
      <form method="post" action="/admin/sms" class="admin-form">
        <input type="hidden" name="key" value="{{ t.key }}" />
        <label>Texti<textarea name="body" rows="3">{{ t.body }}</textarea></label>
        <button class="btn btn-primary" type="submit">Vista</button>
      </form>
    </section>
    {% endfor %}
    </div>
    </div>
{% include "footer" %}
