{% include "header" %}
    <div class="admin-layout">
      {% include "admin_nav" %}
      <div class="admin-main">
        <section class="admin-head">
          <div>
            <h1>Tilkynningar</h1>
            <p class="lede">Yfirlit yfir nýjustu bókanir og greiðsluatburði.</p>
          </div>
        </section>

    <section class="admin-feed">
      {% for a in announcements %}
      <article class="admin-feed-item">
        <h3>{{ a.title }}</h3>
        <p>{{ a.body }}</p>
        <time>{{ a.at }}</time>
      </article>
      {% endfor %}
      <p class="muted admin-empty">Engir nýlegir atburðir.</p>
    </section>
    </div>
    </div>
{% include "footer" %}
