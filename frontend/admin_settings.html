{% include "header" %}
    <div class="admin-layout">
      {% include "admin_nav" %}
      <div class="admin-main">
        <section class="admin-head">
          <div>
            <h1>Stillingar</h1>
            <p class="lede">Millifærsluupplýsingar og tilkynningar.</p>
          </div>
        </section>

    {% if saved %}<p class="admin-banner admin-banner-ok">Stillingar vistaðar.</p>{% endif %}
    {% if error %}<p class="admin-banner admin-banner-error">{{ error }}</p>{% endif %}

    <section class="admin-card">
      <h2>Millifærsla</h2>
      <form method="post" action="/admin/settings" class="admin-form">
        <input type="hidden" name="section" value="bank_transfer" />
        <label>Heiti banka<input name="bankName" value="{{ bank_name }}" /></label>
        <label>Viðtakandi<input name="accountHolder" value="{{ account_holder }}" /></label>
        <label>Kennitala<input name="kennitala" value="{{ kennitala }}" /></label>
        <label>Reikningur<input name="accountNumber" value="{{ account_number }}" /></label>
        <button class="btn btn-primary" type="submit">Vista millifærslu</button>
      </form>
    </section>

    <section class="admin-card">
      <h2>Tilkynningar</h2>
      <form method="post" action="/admin/settings" class="admin-form">
        <input type="hidden" name="section" value="notifications" />
        <label class="checkbox-row">
          <input name="adminCopyEnabled" type="checkbox" {% if admin_copy_enabled %}checked{% endif %} />
          Senda afrit til stjórnanda
        </label>
        <label>Netfang stjórnanda<input name="adminEmail" value="{{ admin_email }}" /></label>
        <label>Sími stjórnanda<input name="adminPhone" value="{{ admin_phone }}" /></label>
        <button class="btn btn-primary" type="submit">Vista tilkynningar</button>
      </form>
    </section>
    </div>
    </div>
{% include "footer" %}
